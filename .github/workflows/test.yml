name: Test Foundry Translator Agent

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install packages
        run: run: pip install openai

      - name: Run translator test
        env:
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
        run: python Translator_Test.py
